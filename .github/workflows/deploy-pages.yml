name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build
        env:
          VITE_SITE_URL: https://www.nikoleglenn.com
          VITE_INSTAGRAM_FEED_EMBED_URL: ${{ secrets.VITE_INSTAGRAM_FEED_EMBED_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  enable-https:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
    steps:
      - name: Enforce HTTPS when certificate is ready
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${{ github.repository }}/pages" \
            -f cname=www.nikoleglenn.com \
            -F https_enforced=true
